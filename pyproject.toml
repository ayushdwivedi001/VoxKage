[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "voxkage"
version = "1.1.5"
description = "VoxKage - OS-level Agentic AI Assistant. Autonomous, Persistent, Aware."
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
authors = [{name = "Ayush Dwivedi"}]
keywords = ["ai", "assistant", "agentic", "os", "automation", "mcp", "gemini"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: End Users/Desktop",
    "Intended Audience :: Information Technology",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: System :: Systems Administration",
    "Topic :: Desktop Environment",
]

# ---------------------------------------------------------
# CORE - installed with pipx install voxkage  (~80 MB)
#
# Fast first install that makes VoxKage feel IMMEDIATELY powerful.
# Heavy ML packs (RAG ~500MB, Vision ~250MB) are optional extras
# installed via voxkage init or voxkage install <pack>.
# All MCP servers guard optional deps with try/except ImportError.
# ---------------------------------------------------------
dependencies = [
    # Runtime and wiring
    "mcp>=1.0",
    "httpx>=0.27",
    "requests>=2.31",
    "python-dotenv>=1.0",

    # OS integration (cross-platform)
    "psutil>=5.9",
    "pyautogui>=0.9",
    "pygetwindow>=0.0.9",
    "Pillow>=10.0",

    # OS integration (Windows-only, auto-skipped on other platforms)
    "pywin32>=306; sys_platform=='win32'",
    "winshell>=0.6; sys_platform=='win32'",
    "winotify>=1.1; sys_platform=='win32'",
    "pywinauto>=0.6; sys_platform=='win32'",
    "pycaw>=20240210; sys_platform=='win32'",
    "comtypes>=1.3; sys_platform=='win32'",

    # Office document read/write
    "python-docx>=1.1",
    "openpyxl>=3.1",
    "python-pptx>=0.6",

    # System tray icon (core feature, ~1 MB)
    "pystray>=0.19",

    # Plugin API integrations
    "spotipy>=2.23",
    "PyGithub>=2.1",
    "google-auth>=2.22",
    "google-auth-oauthlib>=1.1",
    "google-api-python-client>=2.100",
    "python-telegram-bot>=20.0",
]

# ---------------------------------------------------------
# OPTIONAL PACKS - voxkage install <pack> or voxkage init
# ---------------------------------------------------------
[project.optional-dependencies]
# Install via: voxkage install <pack>  OR  pipx inject voxkage <packages>
browser = [
    # Playwright web automation + PDF reading (always needed as a pair)
    # web_agent.py, rag_server.py, and file_ops_server.py degrade gracefully without these.
    "playwright>=1.40",
    "PyMuPDF>=1.23",
    # Total: ~80 MB (Chromium binary is separate: playwright install chromium, ~150 MB)
]
rag = [
    # Semantic memory, codebase indexing, cross-session document search
    # rag_server degrades gracefully without these ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â no crash on startup.
    "chromadb>=1.5",
    "sentence-transformers>=3.0",
    "numpy>=1.24",
    "pyarrow>=14.0",
    # Total: ~500 MB (sentence-transformers pulls PyTorch)
]
vision = [
    "opencv-python>=4.8",
    "rapidocr-onnxruntime>=1.3",
    # Total: ~250 MB
]
docs_plus = [
    "docx2pdf>=0.1",
    "pdf2docx>=0.5",
    # Total: ~80 MB
]
full = [
    "voxkage[browser,rag,vision,docs_plus]",
    # Total: ~910 MB
]

[project.urls]
Homepage = "https://github.com/ayushdwivedi001/VoxKage"
Repository = "https://github.com/ayushdwivedi001/VoxKage"

[project.scripts]
voxkage = "voxkage.cli:main"

[project.entry-points."voxkage.plugins"]
telegram = "voxkage.plugins.telegram:TelegramPlugin"
gmail    = "voxkage.plugins.gmail:GmailPlugin"
spotify  = "voxkage.plugins.spotify:SpotifyPlugin"
github   = "voxkage.plugins.github:GitHubPlugin"

[tool.setuptools.packages.find]
include = ["voxkage*"]

[tool.setuptools.package-data]
voxkage = [
    "icons/*.png",
    "icons/*.ico",
    "data/shield_blocklist.json",
    "data/.env.example",
    "templates/*",
]
